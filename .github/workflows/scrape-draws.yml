name: Auto-update EuroMillions DB

on:
  schedule:
    # Tuesday and Friday at 20:30 UTC (21:30 Lisbon summer / 20:30 Lisbon winter)
    - cron: '30 20 * * 2,5'
    # Retry at 21:30 UTC (22:30 Lisbon summer / 21:30 Lisbon winter) — covers DST + late publish
    - cron: '30 21 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 openpyxl rich lxml

      - name: Scrape new draws (Euromilhoes DB)
        run: python scripts/scrape_new.py

      - name: Commit and push if DB changed
        run: |
          if [[ -n "$(git status --porcelain euromilhoes.db .version)" ]]; then
            git config user.name "LuisPCFialho"
            git config user.email "luispcfialho@users.noreply.github.com"
            git add euromilhoes.db .version
            git commit -m "Auto: update DB with new draws ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed and pushed."
          else
            echo "Nada para commit, DB inalterada."
          fi

      - name: Trigger AIJackpot auto-fetch (oficial + auto-popula apostasGrupo)
        run: |
          SECRET="0a518ed67d8b163cfc554f62c2f5a14c2168f35f6f623ebfead362b4e1499fa4"
          ENDPOINT="https://jackpot-pt.vercel.app/api/auto-fetch-result"
          echo "POST $ENDPOINT"
          curl -sS -w "\nHTTP %{http_code}\n" -X POST "$ENDPOINT" \
            -H "Authorization: Bearer $SECRET" \
            --max-time 30 || echo "(curl falhou, mas não bloqueamos o workflow)"
