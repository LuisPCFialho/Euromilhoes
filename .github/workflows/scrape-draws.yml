name: Auto-update EuroMillions DB

on:
  schedule:
    - cron: '0 21 * * 2,5'
    - cron: '0 22 * * 2,5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 openpyxl rich lxml

      - name: Scrape new draws
        run: python scripts/scrape_new.py

      - name: Commit and push if DB changed
        run: |
          if [[ -n "$(git status --porcelain euromilhoes.db .version)" ]]; then
            git config user.name "LuisPCFialho"
            git config user.email "luispcfialho@users.noreply.github.com"
            git add euromilhoes.db .version
            git commit -m "Auto: update DB with new draws ($(date -u +%Y-%m-%d))"
            git push
            echo "Committed and pushed."
          else
            echo "Nada para commit, DB inalterada."
          fi
